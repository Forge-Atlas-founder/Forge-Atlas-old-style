name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping install."
          fi

      - name: Run format check if present
        shell: bash
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.['format:check'] ? 0 : 1)" \
              && npm run format:check \
              || echo "No format:check script"
          fi

      - name: Run lint if present
        shell: bash
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.lint ? 0 : 1)" \
              && npm run lint \
              || echo "No lint script"
          fi

      - name: Build
        shell: bash
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.build ? 0 : 1)" \
              && npm run build \
              || echo "No build script"
          fi

      - name: Run tests if present
        shell: bash
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.test ? 0 : 1)" \
              && npm test \
              || echo "No test script"
          fi

      - name: Audit all
        shell: bash
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.['audit:all'] ? 0 : 1)" \
              && npm run audit:all \
              || echo "No audit:all script"
          fi

      - name: Upload public artifact
        if: always() && hashFiles('public/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: public-site
          path: public
          name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '23 5 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps if present
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping install."
          fi

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Manual build fallback
        if: failure()
        shell: bash
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.build ? 0 : 1)" \
              && npm run build \
              || echo "No manual build script available"
          fi

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        name: "Forge Atlas CodeQL Config"

paths:
  - src
  - scripts
  - workers

paths-ignore:
  - node_modules
  - public
  - dist
  - build
  - coverage
  - source-archives
  name: Repo Health

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'
  push:
    branches: [main, master]
    paths:
      - "scripts/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - ".github/workflows/repo-health.yml"

permissions:
  contents: read

jobs:
  repo-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        if: hashFiles('package.json') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Audit links
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.['audit:links'] ? 0 : 1)" \
              && npm run audit:links \
              || echo "No audit:links script"
          fi

      - name: Audit metadata
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.['audit:metadata'] ? 0 : 1)" \
              && npm run audit:metadata \
              || echo "No audit:metadata script"
          fi

      - name: Audit sitemap
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.['audit:sitemap'] ? 0 : 1)" \
              && npm run audit:sitemap \
              || echo "No audit:sitemap script"
          fi

      - name: Audit assets
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.['audit:assets'] ? 0 : 1)" \
              && npm run audit:assets \
              || echo "No audit:assets script"
          fi

      - name: Audit duplicates if present
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.['audit:duplicates'] ? 0 : 1)" \
              && npm run audit:duplicates \
              || echo "No audit:duplicates script"
          fi

      - name: Audit nav if present
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.['audit:nav'] ? 0 : 1)" \
              && npm run audit:nav \
              || echo "No audit:nav script"
          fi

      - name: Audit deploy if present
        run: |
          if [ -f package.json ]; then
            node -e "const p=require('./package.json'); process.exit(p.scripts?.['audit:deploy'] ? 0 : 1)" \
              && npm run audit:deploy \
              || echo "No audit:deploy script"
          fi
